  <style>
    /* Galerie-Styling */
    #galerie {
      background-color: #101c33; /* Dunkelblauer Hintergrund */
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .galerie-title {
      font-size: 2.5rem;
      margin-bottom: 40px;
    }

    .galerie-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .galerie-item {
      background-color: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .galerie-item img {
      width: 100%;
      height: 260px; /* Einheitliche Höhe */
      object-fit: cover; /* Bilder füllen den Raum, ohne verzerrt zu werden */
      display: block;
    }

    .galerie-caption {
      padding: 15px;
      font-weight: 600;
      color: #2e7d32; /* Grüner Text */
      background: white;
    }

    /* Responsives Design für kleinere Bildschirme */
    @media (max-width: 900px) {
      .galerie-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .galerie-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
